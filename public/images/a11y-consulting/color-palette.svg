<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="Commissioner, Inter, sans-serif">
  <!-- Background -->
  <rect width="820" height="340" rx="12" fill="#faf9f6" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-family="Bricolage Grotesque, Raleway, sans-serif" font-weight="700" font-size="18" fill="#2d2d2d">Color Palette</text>

  <!-- Row 1: Primary colors -->
  <!-- Cream -->
  <rect x="30" y="62" width="120" height="90" rx="8" fill="#FAF6F0" stroke="#E8DCC8" stroke-width="2"/>
  <text x="90" y="178" text-anchor="middle" font-weight="600" font-size="13" fill="#2d2d2d">Cream</text>
  <text x="90" y="196" text-anchor="middle" font-size="11" fill="#555555">#FAF6F0</text>
  <text x="90" y="212" text-anchor="middle" font-size="11" fill="#555555">--cream</text>
  <text x="90" y="228" text-anchor="middle" font-size="10" fill="#8C7B6B">Backgrounds</text>

  <!-- Sand -->
  <rect x="170" y="62" width="120" height="90" rx="8" fill="#E8DCC8" stroke="#d4c8b0" stroke-width="2"/>
  <text x="230" y="178" text-anchor="middle" font-weight="600" font-size="13" fill="#2d2d2d">Sand</text>
  <text x="230" y="196" text-anchor="middle" font-size="11" fill="#555555">#E8DCC8</text>
  <text x="230" y="212" text-anchor="middle" font-size="11" fill="#555555">--sand</text>
  <text x="230" y="228" text-anchor="middle" font-size="10" fill="#8C7B6B">Borders, Dividers</text>

  <!-- Terracotta -->
  <rect x="310" y="62" width="120" height="90" rx="8" fill="#B85042" stroke="#9A3C30" stroke-width="2"/>
  <text x="370" y="178" text-anchor="middle" font-weight="600" font-size="13" fill="#2d2d2d">Terracotta</text>
  <text x="370" y="196" text-anchor="middle" font-size="11" fill="#555555">#B85042</text>
  <text x="370" y="212" text-anchor="middle" font-size="11" fill="#555555">--terracotta</text>
  <text x="370" y="228" text-anchor="middle" font-size="10" fill="#8C7B6B">CTAs, Focus, Accents</text>

  <!-- Deep Brown -->
  <rect x="450" y="62" width="120" height="90" rx="8" fill="#3D2B1F" stroke="#2E1F14" stroke-width="2"/>
  <text x="510" y="178" text-anchor="middle" font-weight="600" font-size="13" fill="#2d2d2d">Deep Brown</text>
  <text x="510" y="196" text-anchor="middle" font-size="11" fill="#555555">#3D2B1F</text>
  <text x="510" y="212" text-anchor="middle" font-size="11" fill="#555555">--deep-brown</text>
  <text x="510" y="228" text-anchor="middle" font-size="10" fill="#8C7B6B">Primary Text</text>

  <!-- Text Secondary -->
  <rect x="590" y="62" width="120" height="90" rx="8" fill="#5C4A3A" stroke="#4a3a2c" stroke-width="2"/>
  <text x="650" y="178" text-anchor="middle" font-weight="600" font-size="13" fill="#2d2d2d">Warm Brown</text>
  <text x="650" y="196" text-anchor="middle" font-size="11" fill="#555555">#5C4A3A</text>
  <text x="650" y="212" text-anchor="middle" font-size="11" fill="#555555">--text-secondary</text>
  <text x="650" y="228" text-anchor="middle" font-size="10" fill="#8C7B6B">Secondary Text</text>

  <!-- Warm Gray -->
  <rect x="730" y="62" width="60" height="90" rx="8" fill="#8C7B6B" stroke="#7a6a5c" stroke-width="2"/>
  <text x="760" y="178" text-anchor="middle" font-weight="600" font-size="13" fill="#2d2d2d">Muted</text>
  <text x="760" y="196" text-anchor="middle" font-size="11" fill="#555555">#8C7B6B</text>
  <text x="760" y="212" text-anchor="middle" font-size="11" fill="#555555">--text-muted</text>
  <text x="760" y="228" text-anchor="middle" font-size="10" fill="#8C7B6B">Captions</text>

  <!-- Contrast ratios note -->
  <rect x="30" y="260" width="760" height="60" rx="8" fill="#FAF6F0" stroke="#E8DCC8" stroke-width="1.5"/>
  <text x="410" y="284" text-anchor="middle" font-size="12" fill="#5C4A3A">Contrast ratios: Terracotta on Cream = 4.8:1 (passes AA text) · Deep Brown on Cream = 12.4:1 (passes AAA)</text>
  <text x="410" y="304" text-anchor="middle" font-size="12" fill="#5C4A3A">All UI components meet 3:1 minimum · No information conveyed by color alone</text>
</svg>