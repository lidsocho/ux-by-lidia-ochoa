<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="Commissioner, Inter, sans-serif">
  <rect width="960" height="340" fill="#fafaf8"/>

  <!-- Tier 1 -->
  <rect x="30" y="20" width="280" height="300" rx="12" fill="#fff" stroke="#2d2d2d" stroke-width="2"/>
  <rect x="30" y="20" width="280" height="6" rx="12" fill="#ffad00"/>
  <text x="170" y="56" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2d2d">Accessibility Scorecard</text>
  <text x="170" y="78" text-anchor="middle" font-size="22" font-weight="700" fill="#ffad00">Free</text>

  <line x1="60" y1="94" x2="280" y2="94" stroke="#eee" stroke-width="1"/>
  <text x="60" y="118" font-size="11" fill="#555">Single-page review</text>
  <text x="60" y="138" font-size="11" fill="#555">10 WCAG criteria scored</text>
  <text x="60" y="158" font-size="11" fill="#555">Severity ratings per issue</text>
  <text x="60" y="178" font-size="11" fill="#555">Overall accessibility posture</text>
  <text x="60" y="198" font-size="11" fill="#555">PDF deliverable</text>

  <!-- Tier 2 -->
  <rect x="340" y="10" width="280" height="320" rx="12" fill="#fff" stroke="#ffad00" stroke-width="3"/>
  <rect x="340" y="10" width="280" height="6" rx="12" fill="#ffad00"/>
  <rect x="420" y="22" width="120" height="22" rx="11" fill="#ffad00"/>
  <text x="480" y="37" text-anchor="middle" font-size="10" font-weight="700" fill="#2d2d2d">MOST POPULAR</text>
  <text x="480" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2d2d">Essential Evaluation</text>
  <text x="480" y="88" text-anchor="middle" font-size="22" font-weight="700" fill="#ffad00">$500</text>

  <line x1="370" y1="104" x2="590" y2="104" stroke="#eee" stroke-width="1"/>
  <text x="370" y="128" font-size="11" fill="#555">3-5 page evaluation</text>
  <text x="370" y="148" font-size="11" fill="#555">Cross-page flow analysis</text>
  <text x="370" y="168" font-size="11" fill="#555">Annotated slide deck</text>
  <text x="370" y="188" font-size="11" fill="#555">WCAG mapping per issue</text>
  <text x="370" y="208" font-size="11" fill="#555">Prioritized recommendations</text>
  <text x="370" y="228" font-size="11" fill="#555">Everything in Scorecard tier</text>

  <!-- Tier 3 -->
  <rect x="650" y="20" width="280" height="300" rx="12" fill="#fff" stroke="#2d2d2d" stroke-width="2"/>
  <rect x="650" y="20" width="280" height="6" rx="12" fill="#ffad00"/>
  <text x="790" y="56" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2d2d">Comprehensive Evaluation</text>
  <text x="790" y="78" text-anchor="middle" font-size="22" font-weight="700" fill="#ffad00">$2,000</text>

  <line x1="680" y1="94" x2="900" y2="94" stroke="#eee" stroke-width="1"/>
  <text x="680" y="118" font-size="11" fill="#555">Full site usability audit</text>
  <text x="680" y="138" font-size="11" fill="#555">Assistive technology testing</text>
  <text x="680" y="158" font-size="11" fill="#555">30-minute walkthrough call</text>
  <text x="680" y="178" font-size="11" fill="#555">Remediation roadmap</text>
  <text x="680" y="198" font-size="11" fill="#555">Implementation support</text>
  <text x="680" y="218" font-size="11" fill="#555">Everything in Essential tier</text>
</svg>