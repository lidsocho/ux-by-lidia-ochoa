<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Commissioner, Inter, sans-serif">
  <rect width="960" height="540" fill="#fafaf8"/>

  <!-- Title -->
  <text x="40" y="36" font-size="18" font-weight="700" fill="#2d2d2d">Component Spec: Project Card</text>
  <text x="40" y="54" font-size="11" font-weight="600" fill="#888" style="text-transform:uppercase; letter-spacing:0.5px">Portfolio Design System — Dev Handoff Reference</text>

  <!-- Card Preview -->
  <rect x="40" y="80" width="320" height="400" rx="12" fill="#fff" stroke="#2d2d2d" stroke-width="2"/>
  <rect x="40" y="80" width="320" height="6" rx="12" fill="#ffd44f"/>

  <!-- Card image area -->
  <rect x="60" y="100" width="280" height="160" rx="8" fill="#f0f0ec"/>
  <circle cx="200" cy="180" r="50" fill="#e8e4dc" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="184" text-anchor="middle" font-size="12" fill="#999">thumbnail</text>

  <!-- Card meta -->
  <text x="60" y="290" font-size="11" font-weight="600" fill="#888" style="text-transform:uppercase; letter-spacing:0.5px">4/24 - 9/25 · UXR &amp; Design</text>
  <text x="60" y="312" font-size="20" font-weight="700" fill="#2d2d2d">ComBoard</text>
  <text x="60" y="334" font-size="13" font-weight="500" fill="#777">ETRAN inspired keyboard reduced</text>
  <text x="60" y="350" font-size="13" font-weight="500" fill="#777">eye strain &amp; increased independent</text>
  <text x="60" y="366" font-size="13" font-weight="500" fill="#777">spelling by 980%</text>

  <!-- CTA button -->
  <rect x="60" y="390" width="160" height="36" rx="18" fill="#ffd44f" stroke="#2d2d2d" stroke-width="2"/>
  <text x="104" y="413" font-size="13" font-weight="600" fill="#2d2d2d">Read Case Study</text>

  <!-- Dimension annotations -->
  <!-- Padding top -->
  <line x1="375" y1="80" x2="375" y2="100" stroke="#ffd44f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="382" y="94" font-size="10" font-weight="600" fill="#b89a00">20px</text>

  <!-- Padding left -->
  <line x1="40" y1="490" x2="60" y2="490" stroke="#ffd44f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="42" y="504" font-size="10" font-weight="600" fill="#b89a00">20px</text>

  <!-- Image height -->
  <line x1="375" y1="100" x2="375" y2="260" stroke="#ffd44f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="382" y="184" font-size="10" font-weight="600" fill="#b89a00">160px</text>

  <!-- Gap -->
  <line x1="375" y1="260" x2="375" y2="280" stroke="#ffd44f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="382" y="274" font-size="10" font-weight="600" fill="#b89a00">20px gap</text>

  <!-- Specs Panel -->
  <rect x="440" y="80" width="480" height="400" rx="12" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="470" y="112" font-size="14" font-weight="600" fill="#2d2d2d">Props</text>

  <text x="470" y="140" font-family="monospace" font-size="11" fill="#555">image: string</text>
  <text x="650" y="140" font-size="11" fill="#888">— Thumbnail path</text>
  <text x="470" y="160" font-family="monospace" font-size="11" fill="#555">alt: string</text>
  <text x="650" y="160" font-size="11" fill="#888">— Image alt text</text>
  <text x="470" y="180" font-family="monospace" font-size="11" fill="#555">title: string</text>
  <text x="650" y="180" font-size="11" fill="#888">— Project name</text>
  <text x="470" y="200" font-family="monospace" font-size="11" fill="#555">description: string</text>
  <text x="650" y="200" font-size="11" fill="#888">— One-line summary</text>
  <text x="470" y="220" font-family="monospace" font-size="11" fill="#555">href?: string</text>
  <text x="650" y="220" font-size="11" fill="#888">— Link to case study</text>
  <text x="470" y="240" font-family="monospace" font-size="11" fill="#555">date: string</text>
  <text x="650" y="240" font-size="11" fill="#888">— Timeline range</text>
  <text x="470" y="260" font-family="monospace" font-size="11" fill="#555">role: string</text>
  <text x="650" y="260" font-size="11" fill="#888">— Designer's role</text>
  <text x="470" y="280" font-family="monospace" font-size="11" fill="#555">accentColor?: string</text>
  <text x="650" y="280" font-size="11" fill="#888">— Project theme color</text>
  <text x="470" y="300" font-family="monospace" font-size="11" fill="#555">disabled?: boolean</text>
  <text x="650" y="300" font-size="11" fill="#888">— Shows "Coming Soon"</text>

  <line x1="470" y1="316" x2="890" y2="316" stroke="#e0e0e0" stroke-width="1"/>

  <text x="470" y="340" font-size="14" font-weight="600" fill="#2d2d2d">Tokens</text>
  <text x="470" y="364" font-family="monospace" font-size="11" fill="#555">border-radius: var(--radius-md)</text>
  <text x="750" y="364" font-size="10" font-weight="600" fill="#b89a00">12px</text>
  <text x="470" y="384" font-family="monospace" font-size="11" fill="#555">padding: var(--space-md)</text>
  <text x="750" y="384" font-size="10" font-weight="600" fill="#b89a00">24px</text>
  <text x="470" y="404" font-family="monospace" font-size="11" fill="#555">font-heading: Bricolage Grotesque</text>
  <text x="750" y="404" font-size="10" font-weight="600" fill="#b89a00">700</text>
  <text x="470" y="424" font-family="monospace" font-size="11" fill="#555">font-body: Commissioner</text>
  <text x="750" y="424" font-size="10" font-weight="600" fill="#b89a00">400</text>
  <text x="470" y="444" font-family="monospace" font-size="11" fill="#555">CTA: var(--radius-full)</text>
  <text x="750" y="444" font-size="10" font-weight="600" fill="#b89a00">pill</text>
  <text x="470" y="464" font-family="monospace" font-size="11" fill="#555">border: 2px solid + neo-thick</text>
  <text x="750" y="464" font-size="10" font-weight="600" fill="#b89a00">offset shadow</text>
</svg>